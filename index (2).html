<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support CRM</title>
  <style>

:root {
  --bg: #0f1420;
  --bg-elevated: #161d2e;
  --card: #1a2233;
  --border: rgba(255, 255, 255, 0.08);
  --border-strong: rgba(255, 255, 255, 0.14);
  --text: #eef1f7;
  --text-muted: rgba(255, 255, 255, 0.65);
  --text-faint: rgba(255, 255, 255, 0.4);
  --accent: #6d8bff;
  --accent-hover: #8aa1ff;
  --accent-text: #0f1420;
  --danger: #ff6b6b;
  --danger-bg: rgba(255, 107, 107, 0.12);
  --open: #ffb454;
  --open-bg: rgba(255, 180, 84, 0.14);
  --progress: #6d8bff;
  --progress-bg: rgba(109, 139, 255, 0.14);
  --closed: #57d38c;
  --closed-bg: rgba(87, 211, 140, 0.14);
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  background-image: radial-gradient(circle at 20% 0%, rgba(109, 139, 255, 0.08), transparent 45%);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ---------- Topbar ---------- */
.topbar {
  border-bottom: 1px solid var(--border);
  background: rgba(15, 20, 32, 0.85);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 20;
}
.topbar__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand__logo {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 18px;
}
.brand__title { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.brand__sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

/* ---------- Buttons ---------- */
.btn {
  font: inherit;
  font-size: 13.5px;
  font-weight: 600;
  padding: 9px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: var(--bg-elevated);
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
}
.btn:hover { background: #202a40; border-color: rgba(255,255,255,0.22); }
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.btn--primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-text);
}
.btn--primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

.icon-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: none;
  color: var(--text-muted);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.15s ease, color 0.15s ease;
}
.icon-btn:hover { background: var(--border); color: var(--text); }

/* ---------- Card ---------- */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  margin: 32px 0 60px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.card__header {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: flex-end;
  justify-content: space-between;
  padding: 22px 24px 18px;
  border-bottom: 1px solid var(--border);
}
.card__title { margin: 0; font-size: 17px; font-weight: 700; }
.card__subtitle { margin: 4px 0 0; font-size: 13px; color: var(--text-muted); }

/* ---------- Filters / Fields ---------- */
.filters { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field__label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.input {
  font: inherit;
  font-size: 13.5px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-strong);
  color: var(--text);
  border-radius: 8px;
  padding: 9px 11px;
  min-width: 160px;
}
.input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
.input--textarea { resize: vertical; min-height: 80px; width: 100%; min-width: 0; }
.input:disabled { opacity: 0.55; cursor: not-allowed; }

/* ---------- Table ---------- */
.table-wrap { overflow-x: auto; }
.table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.table thead th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.table tbody td {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.table tbody tr:last-child td { border-bottom: none; }
.table tbody tr:hover { background: rgba(255, 255, 255, 0.02); }

.empty {
  padding: 48px 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13.5px;
}

/* ---------- Status pills ---------- */
.pill {
  display: inline-block;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.02em;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-elevated);
  color: var(--text-muted);
}
.pill--open { background: var(--open-bg); color: var(--open); }
.pill--progress { background: var(--progress-bg); color: var(--progress); }
.pill--closed { background: var(--closed-bg); color: var(--closed); }

/* ---------- Modal ---------- */
.modal {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.modal[hidden] { display: none; }
.modal__overlay {
  position: fixed;
  inset: 0;
  background: rgba(6, 8, 14, 0.72);
  backdrop-filter: blur(2px);
}
.modal__dialog {
  position: relative;
  width: 100%;
  max-width: 560px;
  background: var(--card);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  animation: modalIn 0.18s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
}
.modal__title { margin: 0; font-size: 15.5px; font-weight: 700; }
.modal__body { padding: 20px; }

/* ---------- Form ---------- */
.form { display: flex; flex-direction: column; gap: 14px; }
.grid { display: grid; gap: 14px; }
.grid--2 { grid-template-columns: 1fr 1fr; }
@media (max-width: 520px) { .grid--2 { grid-template-columns: 1fr; } }
.form__row { display: flex; gap: 10px; margin-top: 2px; }
.form__error {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid rgba(255, 107, 107, 0.3);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 12.5px;
}
.toast {
  background: rgba(87, 211, 140, 0.12);
  color: var(--closed);
  border: 1px solid rgba(87, 211, 140, 0.3);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 12.5px;
}

.subsection { display: flex; flex-direction: column; gap: 14px; }
.subsection__title { margin: 0; font-size: 13px; font-weight: 700; }
.muted { color: var(--text-muted); font-size: 12.5px; margin: 0; }
.divider { height: 1px; background: var(--border); border: none; margin: 4px 0; }

/* ---------- Ticket readout (view mode) ---------- */
.ticket-readout {
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 13.5px;
}
.ticket-readout__row { display: flex; justify-content: space-between; gap: 12px; }
.ticket-readout__label { color: var(--text-faint); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.ticket-readout__desc {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
}

.notes-list { display: flex; flex-direction: column; gap: 8px; }
.note-item {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 13px;
}
.note-item__time { color: var(--text-faint); font-size: 11px; margin-top: 4px; }
.notes-empty { color: var(--text-faint); font-size: 12.5px; }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <div class="brand">
        <div class="brand__logo">🎫</div>
        <div>
          <div class="brand__title">Support CRM</div>
          <div class="brand__sub">Tickets dashboard</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button class="btn btn--primary" id="openNewTicketBtn" type="button">New ticket</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="card__header">
        <div>
          <h2 class="card__title">Tickets</h2>
          <p class="card__subtitle">Create, search, and update ticket status.</p>
        </div>

        <div class="filters">
          <label class="field">
            <span class="field__label">Status</span>
            <select id="statusFilter" class="input">
              <option value="">All</option>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>
          </label>

          <label class="field">
            <span class="field__label">Search</span>
            <input id="searchInput" class="input" placeholder="name, email, ticket id, subject" />
          </label>

          <button class="btn" id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table" role="table">
          <thead>
            <tr>
              <th>Ticket</th>
              <th>Customer</th>
              <th>Subject</th>
              <th>Status</th>
              <th>Created</th>
              <th style="width: 220px">Actions</th>
            </tr>
          </thead>
          <tbody id="ticketsTbody"></tbody>
        </table>
      </div>

      <div class="empty" id="emptyState" hidden>
        No tickets found. Create your first one above.
      </div>
    </section>
  </main>

  <section class="modal" id="ticketModal" hidden>
    <div class="modal__overlay" data-close="true"></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="ticketModalTitle">
      <div class="modal__header">
        <h3 class="modal__title" id="ticketModalTitle">New ticket</h3>
        <button class="icon-btn" type="button" data-close="true" aria-label="Close">✕</button>
      </div>

      <div class="modal__body">

        <!-- CREATE MODE -->
        <form id="ticketForm" class="form">
          <div class="grid grid--2">
            <label class="field">
              <span class="field__label">Customer name</span>
              <input class="input" name="customer_name" required />
            </label>

            <label class="field">
              <span class="field__label">Customer email</span>
              <input class="input" name="customer_email" type="email" required />
            </label>
          </div>

          <label class="field">
            <span class="field__label">Subject</span>
            <input class="input" name="subject" required />
          </label>

          <label class="field">
            <span class="field__label">Description</span>
            <textarea class="input input--textarea" name="description" rows="4"></textarea>
          </label>

          <div class="form__row">
            <button class="btn btn--primary" type="submit">Create ticket</button>
            <button class="btn" type="button" data-close="true">Cancel</button>
          </div>

          <div class="form__error" id="formError" hidden></div>
        </form>

        <!-- VIEW / UPDATE MODE -->
        <div id="updateSection" class="subsection" hidden>

          <div class="ticket-readout" id="ticketReadout"></div>

          <div class="divider"></div>

          <h4 class="subsection__title">Notes</h4>
          <div class="notes-list" id="notesList"></div>

          <div class="divider"></div>

          <h4 class="subsection__title">Update ticket</h4>

          <div class="grid grid--2">
            <label class="field">
              <span class="field__label">Ticket id</span>
              <input class="input" id="updateTicketId" disabled />
            </label>

            <label class="field">
              <span class="field__label">Status</span>
              <select class="input" id="updateStatus">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
              </select>
            </label>
          </div>

          <label class="field">
            <span class="field__label">Add a note</span>
            <textarea class="input input--textarea" id="updateNotes" rows="3" placeholder="Add an internal note..."></textarea>
          </label>

          <div class="form__row">
            <button class="btn btn--primary" type="button" id="saveUpdateBtn">Save update</button>
            <button class="btn" type="button" data-close="true">Close</button>
          </div>

          <div class="form__error" id="updateError" hidden></div>
          <div class="toast" id="toast" hidden></div>
        </div>

      </div>
    </div>
  </section>

  <script>
const API_BASE = "/api";

const els = {
  tbody: document.getElementById("ticketsTbody"),
  empty: document.getElementById("emptyState"),
  statusFilter: document.getElementById("statusFilter"),
  searchInput: document.getElementById("searchInput"),
  refreshBtn: document.getElementById("refreshBtn"),
  openNewTicketBtn: document.getElementById("openNewTicketBtn"),

  ticketModal: document.getElementById("ticketModal"),
  modalTitle: document.getElementById("ticketModalTitle"),

  ticketForm: document.getElementById("ticketForm"),
  formError: document.getElementById("formError"),

  updateSection: document.getElementById("updateSection"),
  ticketReadout: document.getElementById("ticketReadout"),
  notesList: document.getElementById("notesList"),
  updateTicketId: document.getElementById("updateTicketId"),
  updateStatus: document.getElementById("updateStatus"),
  updateNotes: document.getElementById("updateNotes"),
  saveUpdateBtn: document.getElementById("saveUpdateBtn"),
  updateError: document.getElementById("updateError"),
  toast: document.getElementById("toast"),
};


// Helpers


function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatDate(isoString) {
  if (!isoString) return "";
  const d = new Date(isoString);
  if (isNaN(d)) return isoString;
  return d.toLocaleString(undefined, {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
  });
}

function statusBadge(status) {
  const styles = {
    Open: "pill pill--open",
    "In Progress": "pill pill--progress",
    Closed: "pill pill--closed",
  };
  const cls = styles[status] || "pill";
  return `<span class="${cls}">${escapeHtml(status)}</span>`;
}

function show(el) { if (el) el.hidden = false; }
function hide(el) { if (el) el.hidden = true; }

function setError(el, msg) {
  if (!el) return;
  el.textContent = msg;
  show(el);
}


// Modal open/close, mode switching


function openCreateModal() {
  els.modalTitle.textContent = "New ticket";
  els.ticketForm.reset();
  hide(els.formError);
  show(els.ticketForm);
  hide(els.updateSection);

  els.ticketModal.hidden = false;
  const firstInput = els.ticketForm.querySelector('input[name="customer_name"]');
  if (firstInput) firstInput.focus();
}

function openUpdateModal() {
  els.modalTitle.textContent = "Ticket details";
  hide(els.ticketForm);
  hide(els.formError);
  hide(els.updateError);
  hide(els.toast);
  show(els.updateSection);

  els.ticketModal.hidden = false;
}

function closeModal() {
  els.ticketModal.hidden = true;
  hide(els.updateError);
  hide(els.toast);
}

function bindModalClose() {
  els.ticketModal.querySelectorAll("[data-close='true']").forEach((n) => {
    n.addEventListener("click", closeModal);
  });
  els.ticketModal.addEventListener("click", (e) => {
    if (e.target && e.target.classList && e.target.classList.contains("modal__overlay")) {
      closeModal();
    }
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !els.ticketModal.hidden) closeModal();
  });
}


// Rendering


function renderTickets(tickets) {
  els.tbody.innerHTML = "";

  if (!tickets || tickets.length === 0) {
    show(els.empty);
    return;
  }
  hide(els.empty);

  for (const t of tickets) {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <div style="font-weight:700;">${escapeHtml(t.ticket_id)}</div>
        </div>
      </td>
      <td>
        <div style="display:flex;flex-direction:column;gap:2px;">
          <div style="font-weight:600;">${escapeHtml(t.customer_name || "")}</div>
        </div>
      </td>
      <td>${escapeHtml(t.subject || "")}</td>
      <td>${statusBadge(t.status || "Open")}</td>
      <td>${formatDate(t.created_at)}</td>
      <td>
        <div style="display:flex;gap:10px;align-items:center;">
          <button class="btn btn--primary" type="button" data-action="view" data-id="${escapeHtml(t.ticket_id)}">Details / Update</button>
        </div>
      </td>
    `;

    tr.querySelector('button[data-action="view"]').addEventListener("click", () => {
      loadTicketDetails(t.ticket_id);
    });

    els.tbody.appendChild(tr);
  }
}

function renderReadout(t) {
  els.ticketReadout.innerHTML = `
    <div class="ticket-readout__row">
      <span class="ticket-readout__label">Ticket</span>
      <strong>${escapeHtml(t.ticket_id)}</strong>
    </div>
    <div class="ticket-readout__row">
      <span class="ticket-readout__label">Subject</span>
      <span>${escapeHtml(t.subject)}</span>
    </div>
    <div class="ticket-readout__row">
      <span class="ticket-readout__label">Customer</span>
      <span>${escapeHtml(t.customer_name)} — ${escapeHtml(t.customer_email)}</span>
    </div>
    <div class="ticket-readout__row">
      <span class="ticket-readout__label">Created</span>
      <span>${formatDate(t.created_at)}</span>
    </div>
    <div class="ticket-readout__row">
      <span class="ticket-readout__label">Status</span>
      ${statusBadge(t.status)}
    </div>
    <div>
      <div class="ticket-readout__label" style="margin-bottom:6px;">Description</div>
      <div class="ticket-readout__desc">${escapeHtml(t.description || "(no description)")}</div>
    </div>
  `;

  const notes = t.notes || [];
  els.notesList.innerHTML = notes.length
    ? notes
        .slice()
        .reverse()
        .map(
          (n) => `
            <div class="note-item">
              <div>${escapeHtml(n.note_text)}</div>
              <div class="note-item__time">${formatDate(n.created_at)}</div>
            </div>`
        )
        .join("")
    : `<div class="notes-empty">No notes yet.</div>`;
}

// API calls

async function fetchTickets() {
  const params = new URLSearchParams();
  if (els.statusFilter.value) params.set("status", els.statusFilter.value);
  if (els.searchInput.value.trim()) params.set("search", els.searchInput.value.trim());

  const res = await fetch(`${API_BASE}/tickets?${params.toString()}`, {
    method: "GET",
    headers: { Accept: "application/json" },
  });

  if (!res.ok) throw new Error(`Failed to load tickets (${res.status})`);
  return await res.json();
}

async function fetchTicketDetail(ticketId) {
  const res = await fetch(`${API_BASE}/tickets/${encodeURIComponent(ticketId)}`);
  if (!res.ok) throw new Error(`Failed to load ticket (${res.status})`);
  return await res.json();
}

async function submitCreate(payload) {
  const res = await fetch(`${API_BASE}/tickets`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!res.ok) {
    const detail = await res.json().catch(() => null);
    throw new Error(detail?.detail ? JSON.stringify(detail.detail) : `Create failed (${res.status})`);
  }
  return await res.json();
}

async function submitUpdate(ticketId, payload) {
  const res = await fetch(`${API_BASE}/tickets/${encodeURIComponent(ticketId)}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!res.ok) {
    const detail = await res.json().catch(() => null);
    throw new Error(detail?.detail ? JSON.stringify(detail.detail) : `Update failed (${res.status})`);
  }
  return await res.json();
}


// Actions

async function refresh() {
  els.refreshBtn.disabled = true;
  try {
    const tickets = await fetchTickets();
    renderTickets(tickets);
  } catch (e) {
    console.error(e);
  } finally {
    els.refreshBtn.disabled = false;
  }
}

async function loadTicketDetails(ticketId) {
  try {
    const t = await fetchTicketDetail(ticketId);
    openUpdateModal();
    renderReadout(t);
    els.updateTicketId.value = t.ticket_id;
    els.updateStatus.value = t.status || "Open";
    els.updateNotes.value = "";
  } catch (e) {
    console.error(e);
    openUpdateModal();
    setError(els.updateError, e.message || String(e));
  }
}

// Event bindings

els.ticketForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  hide(els.formError);

  const form = new FormData(els.ticketForm);
  const payload = {
    customer_name: (form.get("customer_name") || "").trim(),
    customer_email: (form.get("customer_email") || "").trim(),
    subject: (form.get("subject") || "").trim(),
    description: (form.get("description") || "").trim(),
  };

  try {
    await submitCreate(payload);
    closeModal();
    await refresh();
  } catch (err) {
    setError(els.formError, err.message || String(err));
  }
});

els.saveUpdateBtn.addEventListener("click", async () => {
  hide(els.updateError);
  hide(els.toast);

  const ticketId = els.updateTicketId.value;
  if (!ticketId) {
    setError(els.updateError, "No ticket selected.");
    return;
  }

  const note = (els.updateNotes.value || "").trim();
  const payload = { status: els.updateStatus.value };
  if (note) payload.note = note; // matches backend's TicketUpdate schema (singular "note")

  try {
    await submitUpdate(ticketId, payload);
    const t = await fetchTicketDetail(ticketId);
    renderReadout(t);
    els.updateNotes.value = "";
    els.toast.textContent = "Ticket updated.";
    show(els.toast);
    await refresh();
  } catch (err) {
    setError(els.updateError, err.message || String(err));
  }
});

els.refreshBtn.addEventListener("click", refresh);
els.statusFilter.addEventListener("change", refresh);

let searchDebounce;
els.searchInput.addEventListener("input", () => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(refresh, 300);
});

els.openNewTicketBtn.addEventListener("click", openCreateModal);

bindModalClose();
refresh();

  </script>
</body>
</html>
